<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ParkVisionSaathi — Patrol Operations</title>
    <meta
      name="description"
      content="AI-powered patrol operations dashboard for traffic violation management and intelligent force deployment"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"

    <!-- Mappls Vector Map SDK — key injected from VITE_MAPPLS_KEY at build time.

         detects window.mappls and otherwise falls back to MapLibre GL. -->
    <script src="https://apis.mappls.com/advancedmaps/api/%VITE_MAPPLS_KEY%/map_sdk?v=3.0&layer=vector"></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
